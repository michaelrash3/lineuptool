<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, shrink-to-fit=no"
    />
    <meta name="theme-color" content="#070a12" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/svg+xml" href="/icon-source.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <title>The Bench Coach</title>
    <meta
      name="description"
      content="Team logistics and game-day organization for coaching staff."
    />
    <!-- Canonical/og:url point at the current deploy origin. If a custom domain
         replaces lineuptool.vercel.app, update both here and in
         public/sitemap.xml + public/robots.txt (one source of truth per file). -->
    <link rel="canonical" href="https://lineuptool.vercel.app/" />
    <!-- Social / link previews. -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="The Bench Coach" />
    <meta property="og:url" content="https://lineuptool.vercel.app/" />
    <meta property="og:title" content="The Bench Coach" />
    <meta
      property="og:description"
      content="Team logistics and game-day organization for coaching staff."
    />
    <meta property="og:image" content="/icon-512.png" />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="The Bench Coach" />
    <meta
      name="twitter:description"
      content="Team logistics and game-day organization for coaching staff."
    />
    <meta name="twitter:image" content="/icon-512.png" />
    <!-- Set the theme before first paint to avoid a light/dark flash.
         Mirrors src/hooks/useTheme: stored "light" | "dark" | "system". -->
    <script>
      (function () {
        try {
          var stored = localStorage.getItem("cc.theme") || "dark";
          var dark =
            stored === "dark" ||
            (stored === "system" &&
              window.matchMedia &&
              window.matchMedia("(prefers-color-scheme: dark)").matches);
          if (dark) document.documentElement.setAttribute("data-theme", "dark");
        } catch (e) {}
      })();
    </script>
    <!-- Fonts are self-hosted via @fontsource and imported in src/fonts.ts
         (bundled + service-worker precached for offline field use). No
         render-blocking Google Fonts request here. -->
  </head>

  <body>
    <noscript> You need to enable JavaScript to run this app. </noscript>
    <div id="root"></div>
    <script type="module" src="/src/index.tsx"></script>
  </body>
</html>
