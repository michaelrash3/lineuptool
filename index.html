<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, shrink-to-fit=no"
    />
    <meta name="theme-color" content="#070a12" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/svg+xml" href="/icon-source.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <title>Coach's Card</title>
    <meta
      name="description"
      content="Youth-baseball lineup builder, in-game swap manager, and player evaluation tool for head and assistant coaches."
    />
    <!-- Social / link previews. og:image is root-relative; most crawlers
         resolve it against the deploy origin. When a production domain is set
         up, add an absolute <link rel="canonical"> + og:url here (a
         guessed/wrong canonical hurts SEO more than omitting it). -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Coach's Card" />
    <meta property="og:title" content="Coach's Card" />
    <meta
      property="og:description"
      content="Youth-baseball lineup builder, in-game swap manager, and player evaluation tool for head and assistant coaches."
    />
    <meta property="og:image" content="/icon-512.png" />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Coach's Card" />
    <meta
      name="twitter:description"
      content="Youth-baseball lineup builder, in-game swap manager, and player evaluation tool for head and assistant coaches."
    />
    <meta name="twitter:image" content="/icon-512.png" />
    <!-- Set the theme before first paint to avoid a light/dark flash.
         Mirrors src/hooks/useTheme: stored "light" | "dark" | "system". -->
    <script>
      (function () {
        try {
          var stored = localStorage.getItem("cc.theme") || "dark";
          var dark =
            stored === "dark" ||
            (stored === "system" &&
              window.matchMedia &&
              window.matchMedia("(prefers-color-scheme: dark)").matches);
          if (dark) document.documentElement.setAttribute("data-theme", "dark");
        } catch (e) {}
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@500;700&display=swap"
      rel="stylesheet"
    />
  </head>

  <body>
    <noscript> You need to enable JavaScript to run this app. </noscript>
    <div id="root"></div>
    <script type="module" src="/src/index.tsx"></script>
  </body>
</html>
