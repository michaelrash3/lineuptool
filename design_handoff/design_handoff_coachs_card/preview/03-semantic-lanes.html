<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  .grid { display:grid; grid-template-columns: repeat(4, 1fr); gap: 14px; padding: 24px; }
  .lane { display:flex; flex-direction:column; gap:8px; }
  .lane .chip { height: 44px; border-radius: 12px; display:flex; align-items:center; justify-content:center; font: var(--fw-black) 10px/1 var(--font-sans); letter-spacing: var(--tracking-widest); text-transform:uppercase; }
  .lane .meta { font: var(--fw-bold) 10px/1.2 var(--font-mono); color: var(--fg-4); }
  .lane .label { font: var(--fw-black) 11px/1 var(--font-sans); letter-spacing: var(--tracking-widest); text-transform:uppercase; color: var(--fg-2); }
</style></head>
<body><div class="card-stage">
  <div class="grid">
    <div class="lane">
      <div class="label">Success</div>
      <div class="chip" style="background:#f0fdf4;color:#15803d;border:1px solid #bbf7d0">Saved</div>
      <div class="chip" style="background:#16a34a;color:#fff">Win · W 7-3</div>
      <div class="meta">50/200/700 · 600</div>
    </div>
    <div class="lane">
      <div class="label">Danger</div>
      <div class="chip" style="background:#fef2f2;color:#b91c1c;border:1px solid #fecaca">Loss</div>
      <div class="chip" style="background:#dc2626;color:#fff">Could not import</div>
      <div class="meta">50/200/700 · 600</div>
    </div>
    <div class="lane">
      <div class="label">Warning</div>
      <div class="chip" style="background:#fffbeb;color:#b45309;border:1px solid #fde68a">Lineup Needed</div>
      <div class="chip" style="background:#f59e0b;color:#fff">Tie · T 4-4</div>
      <div class="meta">50/200/700 · 500</div>
    </div>
    <div class="lane">
      <div class="label">Info</div>
      <div class="chip" style="background:#eff6ff;color:#1d4ed8;border:1px solid #bfdbfe">Cloud Synced</div>
      <div class="chip" style="background:#2563eb;color:#fff">Today</div>
      <div class="meta">50/200/700 · 600</div>
    </div>
  </div>
</div></body></html>
