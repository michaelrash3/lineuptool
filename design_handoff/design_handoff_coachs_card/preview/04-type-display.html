<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  .stack { padding: 22px 24px; display:flex; flex-direction:column; gap: 14px; }
  .row { display:flex; align-items:baseline; gap: 18px; }
  .tk { width: 110px; }
  .ex { color: var(--fg-1); }
  .display { font: 900 36px/1 var(--font-sans); letter-spacing: -0.025em; text-transform: uppercase; }
  .h1 { font: 900 30px/1 var(--font-sans); letter-spacing: -0.025em; text-transform: uppercase; }
  .h2 { font: 900 20px/1.1 var(--font-sans); letter-spacing: 0.05em; text-transform: uppercase; }
  .h3 { font: 900 18px/1.2 var(--font-sans); letter-spacing: 0.1em; text-transform: uppercase; }
  .card { font: 900 24px/1.1 var(--font-sans); letter-spacing: -0.025em; text-transform: uppercase; }
</style></head>
<body><div class="card-stage">
  <div class="stack">
    <div class="row"><div class="tag tk">Display</div><div class="ex display">RIVERHAWKS</div></div>
    <div class="row"><div class="tag tk">H1</div><div class="ex h1">LINEUP GENERATOR</div></div>
    <div class="row"><div class="tag tk">Card Title</div><div class="ex card">VS. RAPTORS</div></div>
    <div class="row"><div class="tag tk">H2</div><div class="ex h2">TEAM ROSTER</div></div>
    <div class="row"><div class="tag tk">H3</div><div class="ex h3">HITTING LEADERS</div></div>
  </div>
</div></body></html>
