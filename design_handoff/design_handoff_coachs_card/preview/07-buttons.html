<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  .wrap { padding: 16px 22px; display:grid; gap: 14px; }
  .row { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; }
  .label { font: 900 9px/1 var(--font-sans); letter-spacing: 0.14em; text-transform: uppercase; color: #64748b; width: 84px; flex-shrink: 0; }

  .btn { display: inline-flex; align-items: center; gap: 8px; font: 900 11px/1 var(--font-sans); letter-spacing: 0.08em; text-transform: uppercase; padding: 10px 16px; border-radius: 10px; border: 1px solid transparent; box-shadow: 0 1px 0 rgba(255,255,255,0.2) inset, 0 1px 2px rgba(15,23,42,0.05); cursor: pointer; }
  .btn svg { width: 14px; height: 14px; }

  .btn-pri { color:#fff; background: linear-gradient(180deg, #3b82f6 0%, #1d4ed8 100%); box-shadow: 0 1px 0 rgba(255,255,255,0.25) inset, 0 4px 14px rgba(37,99,235,0.4), 0 1px 2px rgba(29,78,216,0.4); }
  .btn-pri:hover { transform: translateY(-1px); }

  .btn-hero { color:#fff; background: linear-gradient(180deg, #10b981 0%, #047857 100%); padding: 12px 22px; font-size: 12px; box-shadow: 0 1px 0 rgba(255,255,255,0.25) inset, 0 6px 20px rgba(16,185,129,0.45); }

  .btn-sec { color: #0f172a; background: #fff; border-color: #cbd5e1; box-shadow: 0 1px 0 rgba(15,23,42,0.04), inset 0 -2px 0 rgba(15,23,42,0.04); }
  .btn-sec:hover { background: #f8fafc; }

  .btn-ghost { color: #1d4ed8; background: transparent; border-color: transparent; }
  .btn-ghost:hover { background: #eff6ff; }

  .btn-dark { color: #fff; background: linear-gradient(180deg, #1e293b 0%, #0f172a 100%); border-color: #0f172a; }

  .btn-dn { color:#fff; background: linear-gradient(180deg, #f43f5e 0%, #be123c 100%); box-shadow: 0 1px 0 rgba(255,255,255,0.25) inset, 0 4px 14px rgba(244,63,94,0.4); }
  .btn-wn { color:#78350f; background: linear-gradient(180deg, #fde68a 0%, #fbbf24 100%); border-color: #f59e0b; }

  .btn-icon { width: 36px; padding: 0; justify-content: center; }

  .seg { display: inline-flex; padding: 3px; background: #f1f5f9; border: 1px solid #e2e8f0; border-radius: 10px; gap: 2px; }
  .seg button { font: 900 10px/1 var(--font-sans); letter-spacing: 0.08em; text-transform: uppercase; padding: 7px 12px; border-radius: 7px; border: 0; background: transparent; color: #475569; cursor: pointer; }
  .seg button.on { background: #fff; color: #0f172a; box-shadow: 0 1px 2px rgba(15,23,42,0.08); }

  .spinner { width: 14px; height: 14px; border: 2px solid rgba(255,255,255,0.4); border-top-color: #fff; border-radius: 9999px; animation: sp 0.7s linear infinite; }
  @keyframes sp { to { transform: rotate(360deg); } }
</style></head>
<body><div class="card-stage">
  <div class="wrap">

    <div class="row">
      <span class="label">Primary</span>
      <button class="btn btn-hero"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>Start Game</button>
      <button class="btn btn-pri">Edit Lineup<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg></button>
      <button class="btn btn-pri"><span class="spinner"></span>Saving…</button>
    </div>

    <div class="row">
      <span class="label">Neutral</span>
      <button class="btn btn-sec"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>Team Code</button>
      <button class="btn btn-sec">Cancel</button>
      <button class="btn btn-ghost">View All →</button>
      <button class="btn btn-dark"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>New Team</button>
    </div>

    <div class="row">
      <span class="label">Semantic</span>
      <button class="btn btn-dn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>Delete</button>
      <button class="btn btn-wn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/></svg>Confirm</button>
      <button class="btn btn-icon btn-sec" aria-label="Edit"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="5" r="1"/><circle cx="12" cy="12" r="1"/><circle cx="12" cy="19" r="1"/></svg></button>
      <button class="btn btn-icon btn-pri" aria-label="Add"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></button>
    </div>

    <div class="row">
      <span class="label">Segmented</span>
      <div class="seg">
        <button class="on">Hitting</button>
        <button>Fielding</button>
        <button>Pitching</button>
      </div>
      <div class="seg" style="background:#0f172a;border-color:#1e293b">
        <button class="on" style="background:#2563eb;color:#fff;box-shadow:0 1px 2px rgba(0,0,0,0.3)">Live</button>
        <button style="color:#94a3b8">Season</button>
      </div>
    </div>

  </div>
</div></body></html>
