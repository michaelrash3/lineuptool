<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  .stack { padding: 18px 24px; display:flex; flex-direction:column; gap: 10px; }
  .row { display:flex; align-items:center; gap: 8px; }
  .l { width: 60px; font: 800 10px/1 var(--font-sans); letter-spacing:0.08em; text-transform:uppercase; color: var(--fg-4); }
  .bar { height: 16px; border-radius: 4px; background:#2563eb; }
  .v { font: 700 10px/1 var(--font-mono); color:#1e293b; margin-left:8px; }
</style></head>
<body><div class="card-stage">
  <div class="stack">
    <div class="row"><div class="l">1</div><div class="bar" style="width:4px"></div><div class="v">4 px</div></div>
    <div class="row"><div class="l">2</div><div class="bar" style="width:8px"></div><div class="v">8 px</div></div>
    <div class="row"><div class="l">3</div><div class="bar" style="width:12px"></div><div class="v">12 px · most common gap</div></div>
    <div class="row"><div class="l">4</div><div class="bar" style="width:16px"></div><div class="v">16 px</div></div>
    <div class="row"><div class="l">5</div><div class="bar" style="width:20px"></div><div class="v">20 px · card padding y</div></div>
    <div class="row"><div class="l">6</div><div class="bar" style="width:24px"></div><div class="v">24 px · card padding x</div></div>
    <div class="row"><div class="l">8</div><div class="bar" style="width:32px"></div><div class="v">32 px · section padding</div></div>
    <div class="row"><div class="l">10</div><div class="bar" style="width:40px"></div><div class="v">40 px</div></div>
    <div class="row"><div class="l">12</div><div class="bar" style="width:48px"></div><div class="v">48 px · between major sections</div></div>
  </div>
</div></body></html>
