<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  .wrap { padding: 16px 22px; display: grid; gap: 12px; }

  /* RECORD HERO */
  .record {
    position: relative;
    border-radius: 16px;
    overflow: hidden;
    background:
      radial-gradient(ellipse at 100% 0%, rgba(96,165,250,0.25), transparent 50%),
      linear-gradient(135deg, #0b1220 0%, #0f172a 60%, #1e3a8a 100%);
    color: #fff;
    padding: 16px 18px;
    border: 1px solid rgba(255,255,255,0.08);
    box-shadow: 0 1px 0 rgba(255,255,255,0.08) inset, 0 16px 40px -16px rgba(15,23,42,0.55);
    display: grid; grid-template-columns: auto 1fr auto; gap: 18px; align-items: center;
  }
  .record::before {
    content: ""; position: absolute; inset: 0;
    background-image: radial-gradient(circle, rgba(255,255,255,0.05) 1px, transparent 1.6px);
    background-size: 14px 14px;
    mask-image: linear-gradient(135deg, black 0%, transparent 70%);
    pointer-events: none;
  }
  .record .big {
    font: 900 56px/1 var(--font-sans);
    letter-spacing: -0.04em;
    font-variant-numeric: tabular-nums;
    z-index: 1;
    text-shadow: 0 4px 24px rgba(96,165,250,0.4);
  }
  .record .big .sep { color: #475569; margin: 0 4px; font-weight: 800; }
  .record .big .losses { color: #f87171; }
  .record .meta { z-index: 1; }
  .record .meta .l { font: 900 9px/1 var(--font-sans); letter-spacing: 0.16em; text-transform: uppercase; color: #94a3b8; margin-bottom: 8px; }
  .record .meta h2 { margin: 0; font: 900 18px/1.05 var(--font-sans); letter-spacing: -0.02em; text-transform: uppercase; }
  .record .meta h2 em { font-style: normal; color: #fbbf24; }

  /* Run differential bar */
  .rd { z-index: 1; min-width: 200px; }
  .rd .l { font: 900 9px/1 var(--font-sans); letter-spacing: 0.16em; text-transform: uppercase; color: #94a3b8; margin-bottom: 8px; text-align: right; }
  .rd .bar { height: 10px; background: rgba(255,255,255,0.08); border-radius: 9999px; overflow: hidden; display: flex; }
  .rd .rs { background: linear-gradient(90deg, #10b981, #34d399); height: 100%; box-shadow: 0 0 10px rgba(52,211,153,0.6); }
  .rd .ra { background: linear-gradient(90deg, #f43f5e, #fb7185); height: 100%; box-shadow: 0 0 10px rgba(244,63,94,0.6); }
  .rd .vals { display: flex; justify-content: space-between; margin-top: 6px; font: 900 11px/1 var(--font-sans); font-variant-numeric: tabular-nums; }
  .rd .vals .l { color: #4ade80; margin: 0; letter-spacing: 0.04em; }
  .rd .vals .r { color: #fda4af; letter-spacing: 0.04em; }

  /* STAT CARD GRID */
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
  .sc {
    position: relative;
    background: linear-gradient(180deg, #fff, #f8fafc);
    border: 1px solid #e2e8f0;
    border-radius: 12px;
    padding: 12px 14px;
    box-shadow: 0 1px 0 rgba(255,255,255,0.6) inset, 0 6px 14px -10px rgba(15,23,42,0.18);
    overflow: hidden;
  }
  .sc.lead { background: linear-gradient(180deg, #eff6ff, #dbeafe); border-color: #93c5fd; }
  .sc.gold { background: linear-gradient(180deg, #fffbeb, #fef3c7); border-color: #fcd34d; }
  .sc::before {
    content: ""; position: absolute; left: 0; top: 0; bottom: 0; width: 3px;
    background: linear-gradient(180deg, #3b82f6, #1d4ed8);
  }
  .sc.gold::before { background: linear-gradient(180deg, #fbbf24, #d97706); }
  .sc.neut::before { background: linear-gradient(180deg, #94a3b8, #475569); }

  .sc .lbl { font: 900 9px/1 var(--font-sans); letter-spacing: 0.14em; text-transform: uppercase; color: #64748b; }
  .sc.lead .lbl { color: #1d4ed8; }
  .sc.gold .lbl { color: #b45309; }
  .sc .val { font: 900 30px/1 var(--font-sans); letter-spacing: -0.03em; color: #0f172a; margin-top: 6px; font-variant-numeric: tabular-nums; }
  .sc.lead .val { color: #1d4ed8; }
  .sc.gold .val { color: #b45309; }
  .sc .sub { display: inline-flex; align-items: center; gap: 4px; margin-top: 4px; font: 800 9px/1 var(--font-sans); letter-spacing: 0.06em; text-transform: uppercase; color: #047857; }
  .sc .sub.dn { color: #b91c1c; }
  .sc .sub svg { width: 10px; height: 10px; }

  /* Sparkline placed bottom-right */
  .sc svg.spark {
    position: absolute; right: 6px; bottom: 6px; width: 70px; height: 26px; opacity: 0.6;
  }

  /* Ring stat */
  .ring-card {
    grid-column: span 1;
    background: linear-gradient(180deg, #fff, #f1f5f9);
    border: 1px solid #e2e8f0;
    border-radius: 12px;
    padding: 10px;
    display: flex; align-items: center; gap: 10px;
    box-shadow: 0 1px 0 rgba(255,255,255,0.6) inset, 0 6px 14px -10px rgba(15,23,42,0.18);
  }
  .ring-card .ring { width: 56px; height: 56px; flex-shrink: 0; }
  .ring-card .lbl { font: 900 9px/1 var(--font-sans); letter-spacing: 0.14em; text-transform: uppercase; color: #64748b; }
  .ring-card .val { font: 900 22px/1 var(--font-sans); letter-spacing: -0.02em; color: #0f172a; margin-top: 4px; font-variant-numeric: tabular-nums; }
</style></head>
<body><div class="card-stage">
  <div class="wrap">

    <div class="record">
      <div class="big">9<span class="sep">–</span><span class="losses">5</span></div>
      <div class="meta">
        <div class="l">Season Record</div>
        <h2>Spring <em>2026</em><br/>10U · USSSA</h2>
      </div>
      <div class="rd">
        <div class="l">Run Differential · +34</div>
        <div class="bar">
          <div class="rs" style="width:59%"></div>
          <div class="ra" style="width:41%"></div>
        </div>
        <div class="vals">
          <span class="l">RS 112</span>
          <span class="r">RA 78</span>
        </div>
      </div>
    </div>

    <div class="grid">
      <div class="sc lead">
        <div class="lbl">Team AVG</div>
        <div class="val">.412</div>
        <span class="sub"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="18 15 12 9 6 15"/></svg>+.034 vs L5</span>
        <svg class="spark" viewBox="0 0 70 26" preserveAspectRatio="none">
          <path d="M0 20 L10 18 L20 14 L30 16 L40 10 L50 12 L60 6 L70 4" fill="none" stroke="#1d4ed8" stroke-width="1.6"/>
        </svg>
      </div>
      <div class="sc">
        <div class="lbl">Team OPS</div>
        <div class="val">.948</div>
        <span class="sub"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="18 15 12 9 6 15"/></svg>+.062</span>
        <svg class="spark" viewBox="0 0 70 26" preserveAspectRatio="none">
          <path d="M0 22 L10 18 L20 20 L30 14 L40 12 L50 8 L60 10 L70 6" fill="none" stroke="#0f172a" stroke-width="1.6"/>
        </svg>
      </div>
      <div class="sc gold">
        <div class="lbl">Hot Streak</div>
        <div class="val">4<small style="font-size:14px;font-weight:800;margin-left:4px;letter-spacing:0.04em">games</small></div>
        <span class="sub" style="color:#dc2626">🔥 Hits in every appearance</span>
      </div>
      <div class="ring-card">
        <svg class="ring" viewBox="0 0 56 56">
          <circle cx="28" cy="28" r="22" stroke="#e2e8f0" stroke-width="6" fill="none"/>
          <circle cx="28" cy="28" r="22" stroke="url(#rg)" stroke-width="6" fill="none" stroke-dasharray="138.2 138.2" stroke-dashoffset="5.5" stroke-linecap="round" transform="rotate(-90 28 28)"/>
          <text x="28" y="32" text-anchor="middle" font-family="ui-sans-serif,system-ui" font-weight="900" font-size="13" fill="#0f172a">96%</text>
          <defs><linearGradient id="rg" x1="0" x2="1" y1="0" y2="1"><stop offset="0" stop-color="#10b981"/><stop offset="1" stop-color="#047857"/></linearGradient></defs>
        </svg>
        <div>
          <div class="lbl">Fielding</div>
          <div class="val">.962</div>
        </div>
      </div>
    </div>

  </div>
</div></body></html>
