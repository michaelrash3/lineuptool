<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  .wrap { padding: 16px 22px; display:grid; gap: 16px; }
  .label { font: 900 9px/1 var(--font-sans); letter-spacing: 0.14em; text-transform: uppercase; color: #64748b; margin-bottom: 8px; }

  /* Floating dark primary nav */
  .bar-dark {
    position: relative;
    background: linear-gradient(180deg, #0b1220 0%, #0f172a 100%);
    border-radius: 16px;
    padding: 8px;
    display: flex; align-items: center; gap: 4px;
    border: 1px solid rgba(255,255,255,0.06);
    box-shadow:
      0 1px 0 rgba(255,255,255,0.06) inset,
      0 18px 36px -14px rgba(15,23,42,0.45),
      0 0 0 1px rgba(59,130,246,0.08);
  }
  .bar-dark::before {
    content: ""; position: absolute; left: 14px; right: 14px; top: 0; height: 1px;
    background: linear-gradient(90deg, transparent, #60a5fa 30%, #a78bfa 70%, transparent);
    box-shadow: 0 0 10px #60a5fa;
  }

  .tab {
    position: relative;
    font: 900 10px/1 var(--font-sans);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 10px 14px;
    border-radius: 10px;
    display: inline-flex; align-items: center; gap: 7px;
    color: #94a3b8;
    background: transparent;
    border: 1px solid transparent;
    cursor: pointer;
  }
  .tab svg { width: 13px; height: 13px; }
  .tab:hover { color: #e2e8f0; background: rgba(255,255,255,0.04); }
  .tab.on {
    color: #fff;
    background: linear-gradient(180deg, #3b82f6, #1d4ed8);
    box-shadow:
      0 1px 0 rgba(255,255,255,0.25) inset,
      0 6px 16px rgba(37,99,235,0.55),
      0 0 0 1px rgba(96,165,250,0.4);
    border-color: rgba(255,255,255,0.1);
  }
  .tab.on::after {
    content: ""; position: absolute; left: 12px; right: 12px; bottom: -8px; height: 3px;
    background: linear-gradient(90deg, transparent, #60a5fa, transparent);
    border-radius: 9999px;
    filter: blur(2px);
    opacity: 0.7;
  }
  .tab .badge {
    background: #f43f5e; color: #fff;
    font: 900 8px/1 var(--font-sans); letter-spacing: 0.04em;
    padding: 3px 5px; border-radius: 9999px;
    margin-left: 2px;
    box-shadow: 0 0 0 2px #0f172a;
  }
  .tab.icon-only { padding: 10px; }

  /* Glass segmented */
  .bar-light {
    background: linear-gradient(180deg, rgba(255,255,255,0.85), rgba(241,245,249,0.85));
    backdrop-filter: blur(10px);
    border-radius: 14px;
    padding: 5px;
    display: inline-flex;
    gap: 3px;
    border: 1px solid rgba(255,255,255,0.8);
    box-shadow: 0 1px 0 rgba(255,255,255,0.8) inset, 0 6px 16px -8px rgba(15,23,42,0.2);
  }
  .pill {
    font: 900 10px/1 var(--font-sans);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 10px 14px;
    border-radius: 10px;
    color: #64748b;
    background: transparent;
    border: 1px solid transparent;
    cursor: pointer;
    display: inline-flex; align-items: center; gap: 7px;
  }
  .pill img { width: 14px; height: 14px; opacity: 0.5; filter: grayscale(1) brightness(0.6); transition: 0.2s; }
  .pill.on img { opacity: 1; filter: none; }
  .pill.on {
    color: #1d4ed8;
    background: #fff;
    border-color: #bfdbfe;
    box-shadow:
      0 1px 0 rgba(255,255,255,0.9) inset,
      0 4px 12px rgba(37,99,235,0.18),
      0 0 0 1px rgba(59,130,246,0.15);
  }

  /* Bottom-of-screen mobile tab bar — iOS style */
  .bottom-bar {
    position: relative;
    background: linear-gradient(180deg, rgba(255,255,255,0.95), rgba(255,255,255,0.85));
    backdrop-filter: blur(12px);
    border-radius: 22px;
    padding: 8px 6px 8px 6px;
    display: grid; grid-template-columns: repeat(5, 1fr);
    border: 1px solid rgba(15,23,42,0.06);
    box-shadow:
      0 1px 0 rgba(255,255,255,0.9) inset,
      0 22px 40px -12px rgba(15,23,42,0.18),
      0 4px 10px rgba(15,23,42,0.04);
  }
  .ent {
    display: flex; flex-direction: column; align-items: center; gap: 4px;
    padding: 8px 4px; border-radius: 14px;
    color: #94a3b8;
    position: relative;
  }
  .ent .ic {
    width: 36px; height: 36px; border-radius: 12px;
    display: grid; place-items: center;
    background: transparent;
    transition: 0.2s;
  }
  .ent .ic svg { width: 18px; height: 18px; }
  .ent .lab { font: 900 8px/1 var(--font-sans); letter-spacing: 0.14em; text-transform: uppercase; }
  .ent.on { color: #1d4ed8; }
  .ent.on .ic {
    background: linear-gradient(180deg, #3b82f6, #1d4ed8);
    color: #fff;
    box-shadow: 0 1px 0 rgba(255,255,255,0.25) inset, 0 6px 16px rgba(37,99,235,0.4);
  }
  .ent .notif {
    position: absolute; top: 4px; right: 14px;
    width: 8px; height: 8px; border-radius: 9999px;
    background: #f43f5e;
    border: 2px solid #fff;
    box-shadow: 0 0 8px #f43f5e;
  }
</style></head>
<body><div class="card-stage">
  <div class="wrap">

    <div>
      <div class="label">Primary Nav · Dashboard top</div>
      <div class="bar-dark">
        <button class="tab on">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
          Home
        </button>
        <button class="tab">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
          Schedule<span class="badge">3</span>
        </button>
        <button class="tab">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
          Roster
        </button>
        <button class="tab">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
          Stats
        </button>
        <button class="tab icon-only" style="margin-left:auto">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8a6 6 0 0 0-12 0c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
          <span class="badge" style="position:absolute;top:4px;right:4px;padding:2px 4px;font-size:7px">5</span>
        </button>
      </div>
    </div>

    <div>
      <div class="label">Segmented Filter · Body sections</div>
      <div class="bar-light">
        <button class="pill on">
          <img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@latest/assets/svg/26be.svg" alt=""/>
          Hitting
        </button>
        <button class="pill">
          <img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@latest/assets/svg/1f9e4.svg" alt=""/>
          Fielding
        </button>
        <button class="pill">
          <img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@latest/assets/svg/26a1.svg" alt=""/>
          Pitching
        </button>
        <button class="pill">All Stats</button>
      </div>
    </div>

    <div>
      <div class="label">Bottom Tab Bar · Mobile</div>
      <div class="bottom-bar">
        <div class="ent on">
          <div class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg></div>
          <span class="lab">Home</span>
        </div>
        <div class="ent">
          <div class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg></div>
          <span class="lab">Schedule</span>
          <span class="notif"></span>
        </div>
        <div class="ent">
          <div class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg></div>
          <span class="lab">Live</span>
        </div>
        <div class="ent">
          <div class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg></div>
          <span class="lab">Roster</span>
        </div>
        <div class="ent">
          <div class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg></div>
          <span class="lab">Stats</span>
        </div>
      </div>
    </div>

  </div>
</div></body></html>
