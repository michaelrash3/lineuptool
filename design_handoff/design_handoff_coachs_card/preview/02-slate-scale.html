<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  .scale { display:grid; grid-template-columns: repeat(10, 1fr); gap: 6px; padding: 20px 24px 12px; }
  .swatch .chip { height: 64px; }
  .tag-row { display:flex; flex-wrap:wrap; gap:8px; padding: 0 24px 20px; }
</style></head>
<body><div class="card-stage">
  <div class="scale">
    <div class="swatch"><div class="chip" style="background:#f8fafc;border:1px solid var(--slate-200)"></div><div class="name">50</div></div>
    <div class="swatch"><div class="chip" style="background:#f1f5f9"></div><div class="name">100</div></div>
    <div class="swatch"><div class="chip" style="background:#e2e8f0"></div><div class="name">200</div></div>
    <div class="swatch"><div class="chip" style="background:#cbd5e1"></div><div class="name">300</div></div>
    <div class="swatch"><div class="chip" style="background:#94a3b8"></div><div class="name">400</div></div>
    <div class="swatch"><div class="chip" style="background:#64748b"></div><div class="name">500</div></div>
    <div class="swatch"><div class="chip" style="background:#475569"></div><div class="name">600</div></div>
    <div class="swatch"><div class="chip" style="background:#334155"></div><div class="name">700</div></div>
    <div class="swatch"><div class="chip" style="background:#1e293b"></div><div class="name">800</div></div>
    <div class="swatch"><div class="chip" style="background:#0f172a"></div><div class="name">900</div></div>
  </div>
  <div class="tag-row">
    <span class="tag" style="background:#f8fafc;border-color:#e2e8f0">bg-app · 50</span>
    <span class="tag">hairline-solid · 200</span>
    <span class="tag" style="background:#475569;color:#fff;border-color:#334155">fg-3 · 600</span>
    <span class="tag" style="background:#0f172a;color:#fff;border-color:#0f172a">fg-1 · 900</span>
  </div>
</div></body></html>
