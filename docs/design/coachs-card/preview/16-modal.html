<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  body { background: rgba(15,23,42,0.55); backdrop-filter: blur(4px); }
  .scrim {
    width: 700px; padding: 30px;
    display: grid; place-items: center;
    background:
      radial-gradient(ellipse at 30% 30%, rgba(59,130,246,0.18), transparent 60%),
      radial-gradient(ellipse at 70% 80%, rgba(236,72,153,0.12), transparent 60%),
      rgba(15,23,42,0.7);
    backdrop-filter: blur(8px);
  }
  .modal {
    width: 380px;
    background: linear-gradient(180deg, #fff 0%, #f8fafc 100%);
    border-radius: 20px;
    overflow: hidden;
    border: 1px solid rgba(255,255,255,0.6);
    box-shadow:
      0 1px 0 rgba(255,255,255,0.8) inset,
      0 30px 80px -20px rgba(15,23,42,0.55),
      0 2px 0 rgba(15,23,42,0.04);
  }

  /* Hero block — dramatic dark band with icon */
  .hero {
    position: relative;
    background:
      radial-gradient(circle at 20% 30%, rgba(248,113,113,0.4), transparent 55%),
      linear-gradient(135deg, #450a0a 0%, #1e0a0a 60%, #0f172a 100%);
    padding: 22px 24px 18px;
    color: #fff;
    overflow: hidden;
  }
  .hero::before {
    content: ""; position: absolute; inset: 0;
    background-image: repeating-linear-gradient(135deg, rgba(255,255,255,0.04) 0 6px, transparent 6px 22px);
    pointer-events: none;
  }
  .hero .glyph {
    position: relative;
    width: 52px; height: 52px;
    border-radius: 14px;
    background: linear-gradient(180deg, rgba(248,113,113,0.25), rgba(244,63,94,0.18));
    border: 1px solid rgba(252,165,165,0.35);
    display: grid; place-items: center;
    box-shadow: 0 0 28px rgba(244,63,94,0.4), 0 1px 0 rgba(255,255,255,0.15) inset;
    margin-bottom: 12px;
  }
  .hero .glyph svg { width: 24px; height: 24px; color: #fca5a5; }
  .hero .eyebrow {
    position: relative;
    font: 900 9px/1 var(--font-sans); letter-spacing: 0.18em; text-transform: uppercase;
    color: #fca5a5; margin-bottom: 6px;
  }
  .hero h3 {
    position: relative;
    margin: 0; font: 900 22px/1.1 var(--font-sans);
    letter-spacing: -0.02em; text-transform: uppercase;
  }

  /* Body */
  .body { padding: 18px 24px 22px; }
  .body p {
    margin: 0 0 14px;
    font: 500 13px/1.55 var(--font-sans);
    color: #475569;
  }
  .body p strong { color: #0f172a; font-weight: 900; }

  .summary {
    background: #f8fafc;
    border: 1px solid #e2e8f0;
    border-radius: 10px;
    padding: 10px 12px;
    display: grid; grid-template-columns: auto 1fr auto; gap: 10px; align-items: center;
  }
  .summary .av {
    width: 36px; height: 36px; border-radius: 9999px;
    background: linear-gradient(180deg, #3b82f6, #1d4ed8);
    color: #fff;
    font: 900 13px/1 var(--font-sans);
    display: grid; place-items: center;
    box-shadow: 0 4px 10px rgba(37,99,235,0.4);
  }
  .summary .n { font: 900 13px/1.1 var(--font-sans); letter-spacing: -0.01em; color: #0f172a; }
  .summary .s { font: 800 10px/1.1 var(--font-sans); letter-spacing: 0.06em; text-transform: uppercase; color: #64748b; margin-top: 3px; }
  .summary .st { font: 900 10px/1 var(--font-sans); letter-spacing: 0.1em; text-transform: uppercase; color: #475569; background: #fff; border: 1px solid #e2e8f0; padding: 5px 8px; border-radius: 6px; }

  /* Actions */
  .actions { padding: 0 24px 22px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .btn {
    font: 900 11px/1 var(--font-sans); letter-spacing: 0.1em; text-transform: uppercase;
    padding: 12px 14px; border-radius: 10px;
    border: 1px solid transparent;
    cursor: pointer;
    display: inline-flex; align-items: center; justify-content: center; gap: 6px;
  }
  .b-cancel { background: #fff; border-color: #cbd5e1; color: #475569; box-shadow: 0 1px 0 rgba(255,255,255,0.6) inset, 0 1px 2px rgba(15,23,42,0.04); }
  .b-confirm {
    color: #fff;
    background: linear-gradient(180deg, #f43f5e 0%, #be123c 100%);
    box-shadow: 0 1px 0 rgba(255,255,255,0.25) inset, 0 6px 18px rgba(244,63,94,0.45);
  }
  .b-confirm svg { width: 13px; height: 13px; }
</style></head>
<body><div class="card-stage scrim">
  <div class="modal">
    <div class="hero">
      <div class="glyph">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
      </div>
      <div class="eyebrow">Permanent Action</div>
      <h3>Remove from roster?</h3>
    </div>
    <div class="body">
      <p>You're about to remove <strong>Miguel Rodriguez</strong> from the active roster. Season stats will be archived and accessible from team history.</p>
      <div class="summary">
        <span class="av">MR</span>
        <div>
          <div class="n">Miguel Rodriguez · #14</div>
          <div class="s">SS · 21 H · .412 AVG</div>
        </div>
        <span class="st">12 G</span>
      </div>
    </div>
    <div class="actions">
      <button class="btn b-cancel">Cancel</button>
      <button class="btn b-confirm">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-2 14a2 2 0 0 1-2 2H9a2 2 0 0 1-2-2L5 6"/></svg>
        Remove Player
      </button>
    </div>
  </div>
</div></body></html>
