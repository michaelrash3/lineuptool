<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  .wrap { padding: 16px 22px; }
  .card {
    position: relative;
    border-radius: 18px;
    overflow: hidden;
    background:
      radial-gradient(ellipse at 0% 0%, rgba(59,130,246,0.35), transparent 55%),
      radial-gradient(ellipse at 100% 100%, rgba(236,72,153,0.18), transparent 55%),
      linear-gradient(135deg, #0b1220 0%, #0f172a 60%, #1e1b4b 100%);
    color: #fff;
    border: 1px solid rgba(255,255,255,0.08);
    box-shadow: 0 1px 0 rgba(255,255,255,0.08) inset, 0 20px 50px -16px rgba(15,23,42,0.55);
  }
  /* Halftone dot pattern overlay */
  .card::before {
    content: ""; position: absolute; inset: 0;
    background-image: radial-gradient(circle, rgba(255,255,255,0.06) 1px, transparent 1.6px);
    background-size: 14px 14px;
    mask-image: linear-gradient(135deg, black 0%, transparent 70%);
    pointer-events: none;
  }

  .header {
    position: relative;
    padding: 14px 18px 0;
    display: flex; align-items: center; justify-content: space-between;
    z-index: 2;
  }
  .header .left { display: flex; align-items: center; gap: 8px; }
  .chip-today {
    font: 900 9px/1 var(--font-sans); letter-spacing: 0.14em; text-transform: uppercase;
    padding: 6px 10px; border-radius: 6px;
    background: linear-gradient(180deg, #fde68a, #f59e0b); color: #78350f;
    box-shadow: 0 2px 6px rgba(245,158,11,0.4);
  }
  .chip-flag {
    font: 900 9px/1 var(--font-sans); letter-spacing: 0.1em; text-transform: uppercase;
    padding: 5px 9px 5px 7px; border-radius: 6px;
    background: rgba(74,222,128,0.15); color: #4ade80;
    border: 1px solid rgba(74,222,128,0.35);
    display: inline-flex; gap: 5px; align-items: center;
  }
  .chip-flag .dot { width: 5px; height: 5px; border-radius: 9999px; background: currentColor; box-shadow: 0 0 8px currentColor; }

  .weather {
    display: flex; align-items: center; gap: 6px;
    font: 800 10px/1 var(--font-sans); letter-spacing: 0.06em; text-transform: uppercase;
    color: #94a3b8;
  }
  .weather b { color: #fff; font-weight: 900; }

  .matchup {
    position: relative; z-index: 2;
    padding: 12px 18px 0;
    display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; gap: 14px;
  }
  .team { text-align: center; }
  .team .badge {
    width: 56px; height: 56px; margin: 0 auto 8px;
    border-radius: 50%;
    display: grid; place-items: center;
    font: 900 22px/1 var(--font-sans); letter-spacing: -0.03em;
    box-shadow: 0 1px 0 rgba(255,255,255,0.3) inset, 0 6px 18px rgba(0,0,0,0.4);
    font-variant-numeric: tabular-nums;
  }
  .team.home .badge { background: linear-gradient(180deg, #3b82f6, #1d4ed8); color: #fff; }
  .team.away .badge { background: linear-gradient(180deg, #fff, #cbd5e1); color: #0f172a; }
  .team .name { font: 900 13px/1 var(--font-sans); letter-spacing: 0.04em; text-transform: uppercase; }
  .team .rec { font: 800 9px/1 var(--font-sans); letter-spacing: 0.14em; text-transform: uppercase; color: #94a3b8; margin-top: 4px; }
  .vs {
    font: 900 28px/1 var(--font-sans); letter-spacing: -0.04em; color: #fbbf24;
    text-shadow: 0 0 18px rgba(251,191,36,0.5);
    font-style: italic;
  }

  /* Big Game flag — star inside the team home block when game.isBigGame */
  .big-game {
    position: absolute;
    top: 10px; right: 10px;
    z-index: 5;
    display: inline-flex; align-items: center; gap: 5px;
    padding: 5px 9px 5px 7px;
    border-radius: 9999px;
    font: 900 9px/1 var(--font-sans); letter-spacing: 0.14em; text-transform: uppercase;
    background: linear-gradient(180deg, #fde68a, #f59e0b); color: #78350f;
    box-shadow: 0 2px 6px rgba(245,158,11,0.45), inset 0 1px 0 rgba(255,255,255,0.4);
    cursor: help;
  }
  .big-game .star { font-size: 11px; line-height: 1; filter: drop-shadow(0 1px 0 rgba(0,0,0,0.15)); }
  .big-game:hover + .big-game-tooltip,
  .big-game-tooltip.always {
    opacity: 1; transform: translate(0, 0);
  }
  .big-game-tooltip {
    position: absolute;
    top: 40px; right: 10px;
    width: 230px;
    padding: 10px 12px;
    border-radius: 10px;
    background: rgba(255,255,255,0.97);
    color: #0f172a;
    box-shadow: 0 12px 30px -8px rgba(15,23,42,0.4);
    border: 1px solid rgba(15,23,42,0.08);
    font: 600 11px/1.45 var(--font-sans);
    z-index: 6;
    opacity: 0; transform: translateY(-4px);
    transition: opacity 200ms ease, transform 200ms ease;
    pointer-events: none;
  }
  .big-game-tooltip b {
    display: block;
    font: 900 9px/1 var(--font-sans); letter-spacing: 0.14em; text-transform: uppercase;
    color: #b45309;
    margin-bottom: 5px;
  }
  .big-game-tooltip::before {
    content: "";
    position: absolute; top: -5px; right: 26px;
    width: 10px; height: 10px;
    background: rgba(255,255,255,0.97);
    border-left: 1px solid rgba(15,23,42,0.08);
    border-top: 1px solid rgba(15,23,42,0.08);
    transform: rotate(45deg);
  }

  .info-strip {
    position: relative; z-index: 2;
    margin: 14px 18px 0;
    display: grid; grid-template-columns: repeat(3, 1fr);
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 10px;
    overflow: hidden;
  }
  .info-cell {
    padding: 9px 10px;
    border-right: 1px solid rgba(255,255,255,0.08);
    display: flex; align-items: center; gap: 8px;
    font: 800 11px/1 var(--font-sans); letter-spacing: 0.04em;
    color: #fff;
  }
  .info-cell:last-child { border-right: 0; }
  .info-cell svg { width: 14px; height: 14px; color: #60a5fa; flex-shrink: 0; }
  .info-cell small { display: block; font: 800 8px/1 var(--font-sans); letter-spacing: 0.16em; color: #94a3b8; text-transform: uppercase; margin-bottom: 3px; }

  .cta-row {
    position: relative; z-index: 2;
    padding: 12px 18px 16px;
    display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
  }
  .btn {
    font: 900 11px/1 var(--font-sans); letter-spacing: 0.1em; text-transform: uppercase;
    padding: 12px 14px; border-radius: 10px;
    display: inline-flex; align-items: center; justify-content: center; gap: 8px;
    cursor: pointer; border: 1px solid transparent;
  }
  .btn svg { width: 14px; height: 14px; }
  .b-go { color: #fff; background: linear-gradient(180deg, #10b981 0%, #047857 100%); box-shadow: 0 1px 0 rgba(255,255,255,0.25) inset, 0 6px 18px rgba(16,185,129,0.55); border-color: rgba(255,255,255,0.1); }
  .b-edit { color: #fff; background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.2); backdrop-filter: blur(4px); }
</style></head>
<body><div class="card-stage">
  <div class="wrap">
    <div class="card">
      <span class="big-game" title="Big Game"><span class="star">⭐</span>Big Game</span>
      <span class="big-game-tooltip always"><b>⭐ Big Game</b>Flagged matchups (rivalry, playoff, makeup). Surfaces extra prep CTAs and shows up first in the schedule.</span>
      <div class="header">
        <div class="left">
          <span class="chip-today">Today · 10:30 AM</span>
          <span class="chip-flag"><span class="dot"></span>Lineup Ready</span>
        </div>
        <div class="weather">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/></svg>
          <b>72°</b> Clear
        </div>
      </div>

      <div class="matchup">
        <div class="team home">
          <div class="badge">CC</div>
          <div class="name">Coyotes</div>
          <div class="rec">8–4 · Home</div>
        </div>
        <div class="vs">VS</div>
        <div class="team away">
          <div class="badge">RP</div>
          <div class="name">Raptors</div>
          <div class="rec">9–3 · Visitors</div>
        </div>
      </div>

      <div class="info-strip">
        <div class="info-cell">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
          <div><small>Field</small>Cedar Park · 4</div>
        </div>
        <div class="info-cell">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
          <div><small>Format</small>6 inn · USSSA</div>
        </div>
        <div class="info-cell">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
          <div><small>Present</small>11 of 12</div>
        </div>
      </div>

      <div class="cta-row">
        <button class="btn b-go">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>
          Start In-Game
        </button>
        <button class="btn b-edit">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4z"/></svg>
          Edit Lineup
        </button>
      </div>
    </div>
  </div>
</div></body></html>
