<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  .wrap { padding: 16px 22px; display: grid; gap: 12px; }

  .row {
    position: relative;
    display: grid;
    grid-template-columns: auto 1fr auto;
    align-items: stretch;
    gap: 0;
    background: linear-gradient(180deg, #fff 0%, #f8fafc 100%);
    border: 1px solid #e2e8f0;
    border-radius: 16px;
    overflow: hidden;
    box-shadow:
      0 1px 0 rgba(255,255,255,0.8) inset,
      0 8px 22px -12px rgba(15,23,42,0.2),
      0 1px 2px rgba(15,23,42,0.04);
  }
  .row.absent { background: linear-gradient(180deg, #fafbfc 0%, #f1f5f9 100%); opacity: 0.85; }

  /* Left: photographic-style avatar panel with team-color gradient */
  .avatar-panel {
    position: relative;
    width: 100px;
    background:
      radial-gradient(circle at 30% 30%, rgba(255,255,255,0.25), transparent 60%),
      linear-gradient(135deg, #1d4ed8 0%, #1e3a8a 60%, #0f172a 100%);
    display: grid; place-items: center;
    overflow: hidden;
  }
  .row.absent .avatar-panel {
    background:
      radial-gradient(circle at 30% 30%, rgba(255,255,255,0.18), transparent 60%),
      linear-gradient(135deg, #64748b 0%, #475569 60%, #1e293b 100%);
  }
  .avatar-panel::before {
    content: ""; position: absolute; inset: 0;
    background-image: radial-gradient(circle, rgba(255,255,255,0.08) 1px, transparent 1.6px);
    background-size: 10px 10px;
    mask-image: linear-gradient(135deg, black 0%, transparent 80%);
  }
  .avatar-panel::after {
    content: ""; position: absolute; top: 0; right: 0; bottom: 0; width: 12px;
    background: repeating-linear-gradient(135deg, rgba(255,255,255,0.08) 0 4px, transparent 4px 10px);
  }
  .avatar-panel .initials {
    position: relative;
    width: 54px; height: 54px; border-radius: 9999px;
    background: linear-gradient(180deg, rgba(255,255,255,0.95), rgba(241,245,249,0.85));
    color: #1d4ed8;
    font: 900 18px/1 var(--font-sans); letter-spacing: -0.02em;
    display: grid; place-items: center;
    box-shadow: 0 4px 14px rgba(0,0,0,0.3), 0 1px 0 rgba(255,255,255,0.5) inset;
  }
  .row.absent .avatar-panel .initials { color: #475569; }
  .avatar-panel .num {
    position: absolute;
    bottom: 6px; right: 8px;
    font: 900 22px/1 var(--font-sans);
    letter-spacing: -0.03em;
    color: rgba(255,255,255,0.95);
    font-variant-numeric: tabular-nums;
    text-shadow: 0 2px 4px rgba(0,0,0,0.5);
  }
  .avatar-panel .pos {
    position: absolute;
    top: 6px; left: 8px;
    font: 900 8px/1 var(--font-sans); letter-spacing: 0.18em; text-transform: uppercase;
    color: rgba(255,255,255,0.8);
    background: rgba(0,0,0,0.3);
    padding: 3px 5px;
    border-radius: 4px;
    backdrop-filter: blur(4px);
  }

  /* Middle: identity + tags + last-5 dots + sparkline */
  .ident { padding: 12px 14px; min-width: 0; display: flex; flex-direction: column; justify-content: space-between; }
  .ident .top { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .name { font: 900 17px/1 var(--font-sans); letter-spacing: -0.02em; text-transform: uppercase; color: #0f172a; }
  .pres-dot { width: 8px; height: 8px; border-radius: 9999px; background: #10b981; box-shadow: 0 0 0 3px rgba(16,185,129,0.18), 0 0 10px rgba(16,185,129,0.6); }
  .row.absent .pres-dot { background: #cbd5e1; box-shadow: 0 0 0 3px rgba(148,163,184,0.18); }
  .streak {
    font: 900 9px/1 var(--font-sans); letter-spacing: 0.08em; text-transform: uppercase;
    padding: 4px 7px; border-radius: 7px;
    background: linear-gradient(180deg, #fb923c, #dc2626); color: #fff;
    box-shadow: 0 2px 6px rgba(220,38,38,0.35);
    display: inline-flex; align-items: center; gap: 3px;
  }

  .tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 6px; }
  .tag {
    font: 900 9px/1 var(--font-sans);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 4px 8px;
    border-radius: 6px;
    background: #f1f5f9;
    border: 1px solid #e2e8f0;
    color: #334155;
  }
  .tag.out { background: #fef2f2; border-color: #fecaca; color: #b91c1c; }

  /* Last-5 dots */
  .last5 { display: flex; align-items: center; gap: 4px; margin-top: 8px; font: 800 8px/1 var(--font-sans); letter-spacing: 0.14em; text-transform: uppercase; color: #94a3b8; }
  .last5 .lbl { margin-right: 4px; }
  .last5 .d { width: 16px; height: 16px; border-radius: 4px; display: grid; place-items: center; font: 900 8px/1 var(--font-sans); color: #fff; }
  .last5 .d.w { background: linear-gradient(180deg, #10b981, #047857); }
  .last5 .d.l { background: linear-gradient(180deg, #f43f5e, #be123c); }
  .last5 .d.t { background: linear-gradient(180deg, #fbbf24, #d97706); }

  /* Right: stats panel with big numbers */
  .stats {
    display: grid; grid-template-columns: repeat(4, 60px);
    background: linear-gradient(180deg, #f8fafc 0%, #eff6ff 100%);
    border-left: 1px solid #e2e8f0;
  }
  .stat {
    text-align: center;
    padding: 10px 8px;
    border-right: 1px solid rgba(15,23,42,0.05);
    position: relative;
  }
  .stat:last-child { border-right: 0; }
  .stat.lead {
    background: linear-gradient(180deg, #dbeafe, #bfdbfe);
  }
  .stat.lead::after {
    content: ""; position: absolute; left: 0; right: 0; bottom: 0; height: 3px;
    background: linear-gradient(90deg, #3b82f6, #1d4ed8);
    box-shadow: 0 0 10px rgba(37,99,235,0.4);
  }
  .stat .l { font: 900 8px/1 var(--font-sans); letter-spacing: 0.16em; text-transform: uppercase; color: #94a3b8; margin-bottom: 5px; }
  .stat.lead .l { color: #1d4ed8; }
  .stat .v { font: 900 17px/1 var(--font-sans); letter-spacing: -0.02em; color: #0f172a; font-variant-numeric: tabular-nums; }
  .stat.lead .v { color: #1d4ed8; }
  .stat .d {
    margin-top: 4px;
    font: 800 8px/1 var(--font-sans); letter-spacing: 0.06em;
    color: #047857;
  }
  .stat .d.dn { color: #b91c1c; }
</style></head>
<body><div class="card-stage">
  <div class="wrap">

    <div class="row">
      <div class="avatar-panel">
        <span class="pos">SS</span>
        <span class="initials">MR</span>
        <span class="num">14</span>
      </div>
      <div class="ident">
        <div>
          <div class="top">
            <span class="name">Miguel Rodriguez</span>
            <span class="pres-dot" title="Present"></span>
            <span class="streak">🔥 4 G</span>
          </div>
          <div class="tags">
            <span class="tag">B/T · R/R</span>
            <span class="tag">Age 10</span>
            <span class="tag">12 G</span>
          </div>
        </div>
        <div class="last5">
          <span class="lbl">Last 5</span>
          <span class="d w">W</span>
          <span class="d w">W</span>
          <span class="d l">L</span>
          <span class="d w">W</span>
          <span class="d w">W</span>
        </div>
      </div>
      <div class="stats">
        <div class="stat lead">
          <div class="l">AVG</div>
          <div class="v">.412</div>
          <div class="d">↑ .034</div>
        </div>
        <div class="stat">
          <div class="l">OPS</div>
          <div class="v">1.12</div>
          <div class="d">↑ .062</div>
        </div>
        <div class="stat">
          <div class="l">H</div>
          <div class="v">21</div>
          <div class="d">↑ 4</div>
        </div>
        <div class="stat">
          <div class="l">RBI</div>
          <div class="v">17</div>
          <div class="d">↑ 3</div>
        </div>
      </div>
    </div>

    <div class="row absent">
      <div class="avatar-panel">
        <span class="pos">3B</span>
        <span class="initials">OH</span>
        <span class="num">18</span>
      </div>
      <div class="ident">
        <div>
          <div class="top">
            <span class="name">Owen Hart</span>
            <span class="pres-dot" title="Absent"></span>
          </div>
          <div class="tags">
            <span class="tag">B/T · R/R</span>
            <span class="tag">Age 10</span>
            <span class="tag out">Out · Sick</span>
          </div>
        </div>
        <div class="last5">
          <span class="lbl">Last 5</span>
          <span class="d l">L</span>
          <span class="d w">W</span>
          <span class="d t">T</span>
          <span class="d l">L</span>
          <span class="d w">W</span>
        </div>
      </div>
      <div class="stats">
        <div class="stat">
          <div class="l">AVG</div>
          <div class="v">.241</div>
          <div class="d dn">↓ .012</div>
        </div>
        <div class="stat">
          <div class="l">OPS</div>
          <div class="v">.681</div>
          <div class="d dn">↓ .024</div>
        </div>
        <div class="stat">
          <div class="l">H</div>
          <div class="v">9</div>
          <div class="d">±0</div>
        </div>
        <div class="stat">
          <div class="l">RBI</div>
          <div class="v">5</div>
          <div class="d">±0</div>
        </div>
      </div>
    </div>

  </div>
</div></body></html>
