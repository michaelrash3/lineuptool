<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  .stack { padding: 22px 24px; display:flex; flex-direction:column; gap: 14px; }
  .field { display:flex; flex-direction:column; gap:6px; }
  label { font: 800 10px/1 var(--font-sans); letter-spacing:0.1em; text-transform:uppercase; color: var(--fg-4); }
  input, select { padding: 12px; border-radius: 12px; border: 1px solid #e2e8f0; background: rgba(255,255,255,0.8); font: 700 14px/1 var(--font-sans); color:#1e293b; box-shadow: var(--shadow-sm); outline: none; }
  input:focus, select:focus { box-shadow: 0 0 0 3px rgba(59,130,246,0.45); border-color: #3b82f6; }
  .grid2 { display:grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .dark-input { background: rgba(15,23,42,0.55); color:#fff; border-radius: 8px; border:none; padding:8px 12px; font: 700 12px/1 var(--font-sans); letter-spacing:0.08em; text-transform:uppercase; box-shadow: inset 0 2px 4px rgb(0 0 0 / 0.25); }
  .dark-wrap { background: rgba(15,23,42,0.85); padding: 14px; border-radius: 12px; display:flex; gap:8px; }
  .dark-wrap label { color:#cbd5e1; }
</style></head>
<body><div class="card-stage">
  <div class="stack">
    <div class="grid2">
      <div class="field"><label>League Rules</label><select><option>USSSA Baseball</option></select></div>
      <div class="field"><label>Pitching Format</label><select><option>Kid Pitch</option></select></div>
    </div>
    <div class="dark-wrap">
      <input class="dark-input" style="flex:1" placeholder="ENTER TEAM CODE" />
      <button class="dark-input" style="background:#16a34a">✓</button>
      <button class="dark-input" style="background:#334155">✕</button>
    </div>
  </div>
</div></body></html>
