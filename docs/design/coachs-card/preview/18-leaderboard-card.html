<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  .wrap { padding: 18px 22px; }
  .card {
    background: #fff;
    border: 1px solid rgba(15,23,42,0.06);
    border-radius: 16px;
    box-shadow:
      0 1px 0 rgba(15,23,42,0.04),
      0 10px 30px -12px rgba(15,23,42,0.18);
    overflow: hidden;
    max-width: 340px;
  }
  .head {
    background: linear-gradient(180deg, #0f172a 0%, #1e293b 100%);
    color: #fff;
    padding: 14px 16px;
    display: flex; align-items: center; gap: 12px;
    position: relative;
  }
  .head::after {
    content: ""; position: absolute; left: 0; right: 0; bottom: 0;
    height: 2px;
    background: linear-gradient(90deg, #2563eb 0%, #60a5fa 50%, transparent 100%);
  }
  .head .halo {
    width: 36px; height: 36px; border-radius: 10px;
    background: linear-gradient(180deg, #2563eb, #1d4ed8);
    box-shadow: 0 2px 6px rgba(37,99,235,0.4), inset 0 1px 0 rgba(255,255,255,0.2);
    display: grid; place-items: center;
  }
  .head .halo img { width: 18px; height: 18px; filter: brightness(0) invert(1); }
  .head h4 {
    margin: 0;
    font: 900 11px/1 var(--font-sans);
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }
  .head .sub {
    font: 700 9px/1.2 var(--font-sans);
    color: #94a3b8;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-top: 3px;
  }
  .head .trend {
    margin-left: auto;
    font: 900 10px/1 var(--font-sans);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: #4ade80;
    background: rgba(74,222,128,0.12);
    border: 1px solid rgba(74,222,128,0.3);
    padding: 4px 8px; border-radius: 7px;
  }

  .body { padding: 14px 14px 16px; display: grid; gap: 8px; }
  .item {
    display: grid;
    grid-template-columns: 36px 28px 1fr auto;
    align-items: center;
    gap: 10px;
    padding: 8px 10px;
    border-radius: 10px;
    background: #f8fafc;
    border: 1px solid #eef2f7;
  }
  .item.lead {
    background: linear-gradient(180deg, #eff6ff, #ffffff);
    border-color: #bfdbfe;
    box-shadow: 0 1px 0 rgba(37,99,235,0.06);
  }

  /* Medal rank */
  .medal {
    width: 28px; height: 28px;
    border-radius: 9999px;
    display: grid; place-items: center;
    font: 900 12px/1 var(--font-sans);
    color: #fff;
    box-shadow: 0 2px 4px rgba(15,23,42,0.15), inset 0 1px 0 rgba(255,255,255,0.3);
  }
  .medal.gold    { background: linear-gradient(180deg, #facc15, #ca8a04); }
  .medal.silver  { background: linear-gradient(180deg, #cbd5e1, #94a3b8); }
  .medal.bronze  { background: linear-gradient(180deg, #f97316, #c2410c); }

  /* Jersey number */
  .jnum {
    width: 28px; height: 28px;
    border-radius: 7px;
    background: #fff;
    border: 1px solid #e2e8f0;
    color: #1d4ed8;
    font: 900 12px/1 var(--font-sans);
    display: grid; place-items: center;
    font-variant-numeric: tabular-nums;
    box-shadow: inset 0 -2px 0 rgba(15,23,42,0.04);
  }

  .name {
    font: 800 13px/1.1 var(--font-sans);
    letter-spacing: -0.01em;
    color: #0f172a;
    min-width: 0;
  }
  .item.lead .name { font-weight: 900; }
  .pos {
    font: 800 9px/1 var(--font-sans);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: #64748b;
    margin-top: 4px;
  }

  /* Big value */
  .val {
    font: 900 18px/1 var(--font-sans);
    color: #0f172a;
    font-variant-numeric: tabular-nums;
    letter-spacing: -0.02em;
    text-align: right;
  }
  .item.lead .val { color: #1d4ed8; font-size: 22px; }
  .val small {
    display: block;
    font: 700 9px/1 var(--font-sans);
    color: #94a3b8;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-top: 4px;
  }

  /* Footer baseline */
  .foot {
    padding: 10px 14px;
    background: #f8fafc;
    border-top: 1px solid #eef2f7;
    display: flex; align-items: center; gap: 8px;
    font: 800 9px/1 var(--font-sans);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: #64748b;
  }
  .foot .tag {
    background: #fff;
    border: 1px solid #e2e8f0;
    padding: 4px 7px;
    border-radius: 6px;
    color: #334155;
    font-variant-numeric: tabular-nums;
  }
</style></head>
<body><div class="card-stage">
  <div class="wrap">
    <div class="card">
      <div class="head">
        <div class="halo"><img src="../assets/iconography/bat.svg" alt=""/></div>
        <div>
          <h4>Batting Average</h4>
          <div class="sub">Top 3 · Spring 2026</div>
        </div>
        <span class="trend">↑ +.024 wk</span>
      </div>

      <div class="body">
        <div class="item lead">
          <span class="medal gold">1</span>
          <span class="jnum">14</span>
          <div>
            <div class="name">Miguel Rodriguez</div>
            <div class="pos">SS · #14</div>
          </div>
          <div class="val">.412<small>21 H</small></div>
        </div>

        <div class="item">
          <span class="medal silver">2</span>
          <span class="jnum">07</span>
          <div>
            <div class="name">Ava Park</div>
            <div class="pos">CF · #7</div>
          </div>
          <div class="val">.389<small>18 H</small></div>
        </div>

        <div class="item">
          <span class="medal bronze">3</span>
          <span class="jnum">22</span>
          <div>
            <div class="name">Jaylen Brooks</div>
            <div class="pos">P · #22</div>
          </div>
          <div class="val">.341<small>15 H</small></div>
        </div>
      </div>

      <div class="foot">
        <span>Team Avg</span>
        <span class="tag">.276</span>
        <span style="margin-left:auto;color:#1d4ed8">View all →</span>
      </div>
    </div>
  </div>
</div></body></html>
