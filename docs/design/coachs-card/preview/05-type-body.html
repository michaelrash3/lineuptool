<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  .stack { padding: 22px 24px; display:flex; flex-direction:column; gap: 14px; }
  .row { display:flex; align-items:baseline; gap: 18px; }
  .tk { width: 110px; }
  .body { font: 500 14px/1.5 var(--font-sans); color: var(--fg-3); }
  .body-b { font: 800 14px/1.4 var(--font-sans); color: var(--fg-2); }
  .eyebrow-x { font: 800 10px/1 var(--font-sans); letter-spacing: 0.1em; text-transform: uppercase; color: var(--fg-4); }
  .label { font: 800 10px/1 var(--font-sans); letter-spacing: 0.1em; text-transform: uppercase; color: var(--fg-4); }
  .btn { font: 900 12px/1 var(--font-sans); letter-spacing: 0.1em; text-transform: uppercase; color: var(--fg-2); }
  .stat { font: 900 30px/1 var(--font-sans); color: var(--fg-1); font-variant-numeric: tabular-nums; }
  .meta { font: 700 10px/1 var(--font-sans); letter-spacing: 0.1em; text-transform: uppercase; color: var(--fg-4); }
</style></head>
<body><div class="card-stage">
  <div class="stack">
    <div class="row"><div class="tag tk">Eyebrow</div><div class="eyebrow-x">HEAD COACH DASHBOARD</div></div>
    <div class="row"><div class="tag tk">Label</div><div class="label">LEAGUE RULES</div></div>
    <div class="row"><div class="tag tk">Button</div><div class="btn">ADD PLAYER</div></div>
    <div class="row"><div class="tag tk">Stat Num</div><div class="stat">.412</div></div>
    <div class="row"><div class="tag tk">Body Bold</div><div class="body-b">Miguel Rodriguez · #14</div></div>
    <div class="row"><div class="tag tk">Body</div><div class="body">Manually add players to build your team.</div></div>
    <div class="row"><div class="tag tk">Meta</div><div class="meta">USSSA · KID PITCH · 10U</div></div>
  </div>
</div></body></html>
