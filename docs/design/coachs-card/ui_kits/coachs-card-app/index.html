<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Coach's Card — UI Kit Prototype</title>
  <link rel="icon" href="../../assets/baseball-mark.svg" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../../colors_and_type.css" />
  <style>
    html, body { font-family: 'Inter', system-ui, sans-serif; }
    body {
      background: #f8fafc;
      min-height: 100vh;
    }
    /* tabular numerals everywhere a stat shows up */
    .tabular-nums { font-variant-numeric: tabular-nums; }
  </style>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script src="mock-data.js"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" src="Chrome.jsx" data-presets="react"></script>
  <script type="text/babel" src="HomeDashboard.jsx" data-presets="react"></script>
  <script type="text/babel" data-presets="react">
    const { useState } = React;
    const { LoginScreen, AppHeader, TabBarNav, Lucide, HomeDashboard } = window.CCApp;

    const TABS = [
      { id: "home",       label: "Home",       icon: Lucide.Clipboard },
      { id: "roster",     label: "Roster",     icon: Lucide.Users },
      { id: "schedule",   label: "Schedule",   icon: Lucide.Calendar },
      { id: "evaluation", label: "Evaluation" },
      { id: "settings",   label: "Settings",   icon: Lucide.Settings },
    ];

    function App() {
      const [signedIn, setSignedIn] = useState(true);
      const [activeTab, setActiveTab] = useState("home");
      const team = window.MOCK_TEAM;
      const players = window.MOCK_PLAYERS;
      const games = window.MOCK_GAMES;
      const coaches = window.MOCK_COACHES;

      if (!signedIn) return <LoginScreen onSignIn={() => setSignedIn(true)} />;

      return (
        <div className="min-h-screen pb-16">
          <AppHeader team={team} record={team.record} />
          <TabBarNav team={team} activeTab={activeTab} setActiveTab={setActiveTab} tabs={TABS} />
          <main className="max-w-7xl mx-auto px-6 py-8">
            {activeTab === "home" && (
              <HomeDashboard team={team} players={players} games={games} coaches={coaches} />
            )}
            {activeTab !== "home" && (
              <div className="bg-white/40 border border-white/50 rounded-2xl p-12 text-center shadow-[0_4px_20px_rgb(0,0,0,0.04)]">
                <h2 className="text-2xl font-black uppercase tracking-tight text-slate-900 mb-2">
                  {TABS.find(t => t.id === activeTab).label}
                </h2>
                <p className="text-xs font-bold uppercase tracking-widest text-slate-500">
                  This surface ships in production — see <code>src/screens/</code> in the imported repo.
                </p>
              </div>
            )}
          </main>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
