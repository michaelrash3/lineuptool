# Deploys the repo's firestore.rules to the production Firebase project,
# after validating that the rules file parses.
#
# Triggers:
#   - push to main touching the rules (covers direct/human pushes), and
#   - completion of the auto-merge workflow (covers the common path: a
#     claude/* PR squash-merged by auto-merge). Auto-merge merges with the
#     repo GITHUB_TOKEN, and GitHub suppresses the resulting push event from
#     triggering other workflows — so the push:main trigger above never fires
#     for an auto-merged PR. workflow_run IS delivered for token-driven runs,
#     so we hang the deploy off auto-merge finishing and then check whether the
#     newly-merged commit on main actually changed the rules before deploying.
#   - manual dispatch.
#
# Required GitHub repository secrets (Settings → Secrets and variables →
# Actions):
#   FIREBASE_SERVICE_ACCOUNT_JSON  — full JSON content of a service-account
#                                    key with the "Firebase Rules Admin"
#                                    role on the `lineupgenerator-79159`
#                                    project.
#
# See docs/firebase-rules-rollout.md for the one-time service-account
# creation steps and the per-PR validation matrix.

name: Deploy Firestore Rules

on:
  push:
    branches: [main]
    paths:
      - firestore.rules
      - firebase.json
      - .github/workflows/deploy-firestore-rules.yml
  workflow_run:
    workflows: ["Auto-merge Claude PRs"]
    types: [completed]
  workflow_dispatch:

jobs:
  validate-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read

    steps:
      # Always operate on the latest main: that's the branch we deploy rules
      # from, regardless of which event triggered us. fetch-depth 2 lets the
      # change-detection step diff the merge commit against its parent.
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: main
          fetch-depth: 2

      # Decide whether to deploy. push (already path-filtered) and manual
      # dispatch always proceed. For the auto-merge workflow_run trigger, only
      # proceed when that run succeeded AND the just-merged commit actually
      # touched the rules — otherwise every auto-merge (which fires on every PR)
      # would spin up a needless deploy.
      - name: Detect rules change
        id: detect
        run: |
          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            if [ "${{ github.event.workflow_run.conclusion }}" != "success" ]; then
              echo "Auto-merge run did not succeed — skipping."
              echo "should_deploy=false" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            if git diff --name-only HEAD~1 HEAD \
              | grep -qE '^(firestore\.rules|firebase\.json)$'; then
              echo "Rules changed in the latest main commit — will deploy."
              echo "should_deploy=true" >> "$GITHUB_OUTPUT"
            else
              echo "Latest main commit did not touch the rules — skipping."
              echo "should_deploy=false" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "should_deploy=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Node
        if: steps.detect.outputs.should_deploy == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Install firebase-tools
        if: steps.detect.outputs.should_deploy == 'true'
        run: npm install -g firebase-tools@latest

      - name: Set up Java (Firestore emulator runtime)
        if: steps.detect.outputs.should_deploy == 'true'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      # Boot the Firestore emulator using a fake project id so no real
      # credentials are needed for the parse check. The emulator parses
      # firestore.rules on startup and exits non-zero if the file is
      # syntactically invalid or references undefined functions.
      - name: Validate rules parse (emulator)
        if: steps.detect.outputs.should_deploy == 'true'
        run: |
          firebase emulators:exec \
            --only firestore \
            --project demo-rules-validate \
            "echo 'Firestore rules parse OK'"

      - name: Authenticate to Google Cloud
        if: steps.detect.outputs.should_deploy == 'true'
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}

      - name: Deploy Firestore rules
        if: steps.detect.outputs.should_deploy == 'true'
        run: |
          firebase deploy \
            --only firestore:rules \
            --project lineupgenerator-79159 \
            --non-interactive \
            --force
