# Runs the app's typecheck, lint, unit tests (Vitest), and production build
# (Vite) on pushes to feature branches. Mirrors the local pre-push checks in
# docs/CONTRIBUTING.md. The existing deploy-firestore-rules workflow stays
# separate — it only touches rules on pushes to main.
#
# Trigger is push-only (no pull_request): for a same-repo branch, the push
# event already runs CI and GitHub shows that check on any PR for the same head
# commit, so adding pull_request would only fire a second, redundant run that
# concurrency then cancels — leaving a noisy "cancelled" check. Push-only keeps
# exactly one run per commit. (A fork PR wouldn't get CI this way; not a concern
# for this private single-repo project.)

name: CI

on:
  push:
    branches-ignore:
      - main

# Cancel superseded runs on the same branch so a quick re-push doesn't queue
# redundant builds.
concurrency:
  group: ci-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Fail the build on new high/critical production advisories. Dev-server
      # toolchain advisories do not ship in the Vite production bundle, so keep
      # this gate focused on runtime dependencies.
      - name: Security audit
        run: npm audit --audit-level=high --omit=dev

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      # --bail=1 stops at the first failing test so a broken run goes red fast
      # (auto-merge gates on this job; no value in grinding through 800 more
      # tests once one has failed). Local `npm test` stays full-run for debugging.
      - name: Unit tests
        run: npm test -- --bail=1
        env:
          CI: true

      - name: Production build
        run: npm run build
        env:
          CI: true
