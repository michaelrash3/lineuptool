# Runs the app's typecheck, unit tests, and production build on every PR and
# on pushes to feature branches. Mirrors the local pre-push checks documented
# in docs/CONTRIBUTING.md (CI=true promotes CRA warnings to errors). The
# existing deploy-firestore-rules workflow stays separate — it only touches
# rules on pushes to main.

name: CI

on:
  pull_request:
  push:
    branches-ignore:
      - main

# Cancel superseded runs on the same branch so a quick re-push doesn't queue
# redundant builds. Keying on the branch name (not github.ref) also collapses
# the push + pull_request double-trigger into one run: for a push head_ref is
# empty so it falls back to ref_name, and for a PR head_ref is that same branch
# — so both events share a group and cancel-in-progress keeps just one.
concurrency:
  group: ci-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Unit tests
        run: npm test -- --watchAll=false
        env:
          CI: true

      - name: Production build
        run: npm run build
        env:
          CI: true
