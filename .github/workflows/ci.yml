# Runs the app's typecheck, unit tests, and production build on pushes to
# feature branches. Mirrors the local pre-push checks documented in
# docs/CONTRIBUTING.md (CI=true promotes CRA warnings to errors). The existing
# deploy-firestore-rules workflow stays separate — it only touches rules on
# pushes to main.
#
# Trigger is push-only (no pull_request): for a same-repo branch, the push
# event already runs CI and GitHub shows that check on any PR for the same head
# commit, so adding pull_request would only fire a second, redundant run that
# concurrency then cancels — leaving a noisy "cancelled" check. Push-only keeps
# exactly one run per commit. (A fork PR wouldn't get CI this way; not a concern
# for this private single-repo project.)

name: CI

on:
  push:
    branches-ignore:
      - main

# Cancel superseded runs on the same branch so a quick re-push doesn't queue
# redundant builds.
concurrency:
  group: ci-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Unit tests
        run: npm test -- --watchAll=false
        env:
          CI: true

      - name: Production build
        run: npm run build
        env:
          CI: true
